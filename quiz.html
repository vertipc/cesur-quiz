ores, ya que estos se limitan al uso de recursos del cloud para poder hacer un despliegue de sus aplicaciones, sin tener que entrar en configurar un hardware específico, introducir licencias ni instalar parches de sistema operativo","h":"ff323b0d9706"},{"p":"Entre las siguientes opciones, ¿sabrías identificar las funciones del hipervisor?","o":["Albergar, crear, mantener y gestionar las máquinas virtuales","Albergar, crear, mantener y gestionar las máquinas virtuales; además, mantiene la capa de abstracción entre el hardware físico y las máquinas virtuales","Destruir la capa de abstracción entre el hardware físico y las máquinas virtuales"],"r":"Albergar, crear, mantener y gestionar las máquinas virtuales; además, mantiene la capa de abstracción entre el hardware físico y las máquinas virtuales","h":"296b6e2858b5"},{"p":"¿Qué son los servidores virtuales privados (VPS)?","o":["Es un modelo de servicio en el que el datacenter nos ofrece servidores virtualizados, pero con recursos reservados, eliminando la dependencia del hardware y la flexibilidad y velocidad de operaciones como el reinicio o la migración","Es un modelo de servicio en el que el datacenter nos ofrece servidores virtualizados, pero con recursos reservados, eliminando la dependencia del hardware y teniendo flexibilidad y velocidad en las distintas operaciones","Es un modelo de servicio en el que el datacenter nos ofrece servidores virtualizados, dependiendo del hardware y teniendo flexibilidad y velocidad en las distintas operaciones"],"r":"Es un modelo de servicio en el que el datacenter nos ofrece servidores virtualizados, pero con recursos reservados, eliminando la dependencia del hardware y teniendo flexibilidad y velocidad en las distintas operaciones","h":"5a7be0ca307c"},{"p":"¿Cuáles son las VPN más utilizadas?","o":["Las VPN gratuitas, sin ningún tipo de coste adicional","Oracle VM Server y Elastic Cloud Computing","Site to site y de acceso remoto"],"r":"Site to site y de acceso remoto","h":"a38 almente para pequeñas y medianas empresas","Es el modelo de nube más conveniente para las pequeñas empresas","Para un entorno empresarial de tamaño medio-grande"],"r":"Para un entorno empresarial de tamaño medio-grande","h":"29a5fcdd828f"},{"p":"¿Actualmente se utiliza el modelo de servicio de almacenamiento para trabajar en la nube?","o":["Sí; de hecho, es el más utilizado por su versatilidad y por las ventajas que ofrece frente al modelo de almacenamiento tradicional","En ningún caso, es un escenario que se ha quedado obsoleto por la gran cantidad de datos que suelen manejar las empresas","Sí, pero es el menos utilizado de los 4 escenarios estudiados"],"r":"Sí; de hecho, es el más utilizado por su versatilidad y por las ventajas que ofrece frente al modelo de almacenamiento tradicional","h":"6944f0666e06"},{"p":"¿Cuál es la ciudad que más datacenters tiene del mundo?","o":["Madrid","Londres","Nueva York"],"r":"Londres","h":"7cc3eb75e2d4"},{"p":"¿Por qué la optimización de recursos es una ventaja que muestra la nube híbrida?","o":["Porque a la hora de interconectar ambos modelos se puede replicar la infraestructura a través de las nubes y esto permite que la empresa tenga una redundancia multizona","Porque al usar ambas nubes bajo demanda estamos reduciendo la huella medioambiental, pues usamos entornos completamente virtualizados","Porque cuenta con los servicios de ambas clouds en todo momento y así utiliza el mínimo número de recursos con el máximo de rendimiento"],"r":"Porque cuenta con los servicios de ambas clouds en todo momento y así utiliza el mínimo número de recursos con el máximo de rendimiento","h":"81de39af35b4"},{"p":"¿En qué consiste la categoría Gestionada dentro del alojamiento on-premise?","o":["Consiste en que una empresa externa se encarga de administrar los servicios en la nube, y así la empresa se limita a utilizar los servicios que ofrece su nube interna","Este tipo de categoría no existe dentro del alojamiento on-premise","Consiste en que l n qué tipo de cifrado se utiliza el algoritmo Diffie Hellman?","o":["Cifrado asimétrico","Cifrado simétrico","Cifrado estático"],"r":"Cifrado asimétrico","h":"7372c8bdb238"},{"p":"¿Qué conocemos como ecosistema Hadoop?","o":["Es una plataforma de software de pago orientada al tratamiento de datos, pero sin que lleguen a constituir información de gran tamaño","Es un sistema de información orientado a la gestión que cubre partes de una empresa tales como contabilidad, distribución, facturación o gestión de recursos humanos","Es una plataforma de software libre orientada al tratamiento masivo de datos, desde la recopilación hasta la visualización"],"r":"Es una plataforma de software libre orientada al tratamiento masivo de datos, desde la recopilación hasta la visualización","h":"96299742a9be"},{"p":"¿Cuál ha sido el primer SaaS que se ha usado de manera global?","o":["La mensajería instantánea como WhatsApp","El correo electrónico, a través de Yahoo, Hotmail o Gmail","Los firewalls"],"r":"El correo electrónico, a través de Yahoo, Hotmail o Gmail","h":"c7b59ff21fa4"},{"p":"¿Bajo qué esquema es más aconsejable desplegar una nube privada?","o":["OpenNebula","Datacenter","On-premise"],"r":"Datacenter","h":"e7204a724c9e"},{"p":"¿Qué quiere decir que existen entornos colaborativos en la nube privada?","o":["Significa que los usuarios tienen acceso a un servicio con control de acceso y permisos a entornos orientados al seguimiento de proyectos y consolidación de equipos de trabajo","Significa que los usuarios tienen acceso a un servicio sin control de acceso y sin permisos a entornos orientados al seguimiento de proyectos y consolidación de equipos de trabajo, pero en los que no hay ningún tipo de información importante","Significa que los usuarios tienen acceso a un servicio sin control de acceso y sin permisos a entornos orientados al seguimiento de proyectos y consolidación de equipos de trabajo; al ser compañeros de trabajo, se trata cualquier tipo de información"],"r":" a de administrar los servicios en la nube mediante sus propios medios","Consiste en que una empresa externa se encarga de administrar los servicios en la nube; así la empresa se limita a utilizar los servicios que ofrece su nube interna","Significa que la empresa se encarga de compartir su nube interna con otras empresas para así compartir el coste que supone esto"],"r":"Consiste en que la empresa se encarga de administrar los servicios en la nube mediante sus propios medios","h":"aa46e6907408"},{"p":"¿Por qué dirías que trabajar en una nube privada no es apto para cualquier tipo de organización o empresa?","o":["Porque la mayoría de las empresas no disponen de conocimientos para trabajar en una nube, ya sea privada o pública","Porque el mantenimiento es responsabilidad exclusiva de la organización, por lo que tiene que contar con trabajadores con conocimientos sobre ello, ya que de lo contrario su uso le supondrá un coste muy elevado","Cualquier tipo de empresa puede trabajar en una nube privada, no deja de ser apto en ninguno de los casos"],"r":"Porque el mantenimiento es responsabilidad exclusiva de la organización, por lo que tiene que contar con trabajadores con conocimientos sobre ello, ya que de lo contrario su uso le supondrá un coste muy elevado","h":"6ed0be32bdf9"},{"p":"¿En qué consiste el proceso de autentificación?","o":["Es una técnica que codifica un mensaje utilizando normalmente una clave que solo conocen emisor y receptor","Es un método de firma digital que sirve para corroborar la identidad del firmante mediante una clave asimétrica, compuesta por una clave privada y otra pública","Es un método de corroboración de identidad; emisor y receptor tienen un par de claves y el receptor corrobora su identidad descifrando un mensaje con la clave apropiada que corresponda al par de claves generadas por el emisor"],"r":"Es un método de corroboración de identidad; emisor y receptor tienen un par de claves y el receptor corrobora su identidad descifrando un m function startTimer(m){tmrEnd=Date.now()+m*60000;document.getElementById("tmr").style.display="inline-block";tick();tmrId=setInterval(tick,1000)}

function finishExam(){let c=0,w=0,u=0;const failed=[];cq.forEach(q=>{const s=P[qid(q)];if(s?.s==="c")c++;else if(s?.s==="w"){w++;failed.push(q)}else u++});const t=cq.length,pct=t?Math.round(c/t*100):0;const pass=pct>=50;H.push({d:new Date().toISOString(),s:cur,c,w,u,t,p:pct});svH();let fhtml="";if(failed.length){fhtml='<div style="text-align:left;margin-top:1rem"><h3 style="color:var(--rd);margin-bottom:.5rem">❌ Preguntas falladas:</h3>'+failed.map(q=>'<div style="background:var(--bg3);border:1px solid var(--rbd);border-radius:8px;padding:.6rem;margin-bottom:.4rem;font-size:.82rem"><div style="font-weight:600;margin-bottom:.3rem">'+esc(q.p)+'</div><div style="color:var(--gr)">✅ '+esc(q.r)+'</div></div>').join("")+'</div>'}const r=document.createElement("div");r.className="result-card";r.innerHTML=`<h2>${pass?"🎉 ¡Aprobado!":"😥 Suspenso"}</h2><div class="score ${pass?"pass":"fail"}">${pct}%</div><p>${c} correctas · ${w} incorrectas · ${u} sin contestar</p>${fhtml}`;document.getElementById("qs").prepend(r)}

function renderTabs(){document.getElementById("tabs").innerHTML=BANKS.map(b=>`<div class="tab ${b.k===cur?"on":""}" onclick="sel('${b.k}')">${b.n}<span class="c">${b.d.length}</span></div>`).join("")}

function go(){stopTimer();if(tOn)return;const m=document.getElementById("mode").value;let qs=[...(BANKS.find(b=>b.k===cur)?.d||[])];if(m==="f")qs=qs.filter(q=>P[qid(q)]?.s==="w");else if(m==="n")qs=qs.filter(q=>!P[qid(q)]);else if(m==="h"){showHist();return}shuf(qs);if(m==="e"){qs=qs.slice(0,40);startTimer(45)}cq=qs;render();stats()}

function render(){const c=document.getElementById("qs");if(!cq.length){c.innerHTML='<div class="empty"><h2>No hay preguntas</h2><p>Prueba otro modo</p></div>';return}const L=["a","b","c","d","e"];c.innerHTML=cq.map((q,i)=>{const id=qid(q),sv=P[id],ans=!!sv;return`<div class="qc ${ans?(sv.s==="c"?"gc":"rc"):""}" id="q${i}"><div class="qh"><span class="qn">${i+1}/${cq.length}</span><span>${ans?(sv.s==="c"?"✅":"❌"):""}</span></div><div class="qt">${esc(q.p)}</div><div class="opts">${(q.o||[]).map((o,j)=>{let cl=ans?"dis":"";if(ans&&isOk(o,q.r))cl+=" ok";else if(ans&&sv.i===j)cl+=" no";return`<div class="opt ${cl}" onclick="pick(${i},${j})"><div class="ol">${L[j]}</div><div>${esc(o)}</div></div>`}).join("")}</div><div class="fb ${ans?"sh":""} ${ans?(sv.s==="c"?"gf":"rf"):""}" id="f${i}">${ans?(sv.s==="c"?"✅ ¡Correcto!":`❌ Correcta: <b>${esc(q.r)}</b>`):""}</div></div>`}).join("");window.scrollTo({top:0,behavior:"smooth"})}

function pick(i,j){const q=cq[i],id=qid(q);if(P[id])return;const ok=isOk(q.o[j],q.r);P[id]={s:ok?"c":"w",i:j};if(ok)streak++;else streak=0;showStreak();sv();const card=document.getElementById("q"+i);card.classList.add(ok?"gc":"rc");card.querySelectorAll(".opt").forEach((el,k)=>{el.classList.add("dis");if(isOk(q.o[k],q.r))el.classList.add("ok");else if(k===j&&!ok)el.classList.add("no")});const fb=document.getElementById("f"+i);fb.classList.add("sh",ok?"gf":"rf");fb.innerHTML=ok?"✅ ¡Correcto!":`❌ Correcta: <b>${esc(q.r)}</b>`;card.querySelector(".qh span:last-child").textContent=ok?"✅":"❌";stats();const m=document.getElementById("mode").value;if(m==="e"){const done=cq.filter(q=>P[qid(q)]).length;if(done>=cq.length){stopTimer();finishExam();return}}setTimeout(()=>{const n=document.querySelector(".qc:not(.gc):not(.rc)");if(n)n.scrollIntoView({behavior:"smooth",block:"center"})},350)}

function stats(){const bank=BANKS.find(b=>b.k===cur)?.d||[],t=bank.length;let c=0,w=0;bank.forEach(q=>{const s=P[qid(q)];if(s?.s==="c")c++;else if(s?.s==="w")w++});const a=c+w;document.getElementById("st").textContent=t;document.getElementById("sc").textContent=c;document.getElementById("sw").textContent=w;document.getElementById("sa").textContent=a?Math.round(c/a*100)+"%":"0%";const pct=t?Math.round(a/t*100):0;document.getElementById("pf").style.width=pct+"%";document.getElementById("ptx").textContent=a+"/"+t+" ("+pct+"%)"}

function renderTem(){const tv=document.getElementById("tv");const tk=temKey(cur);let subj=TEM[tk]||TEM[cur];if(!subj){for(const k of Object.keys(TEM)){if(tk.startsWith(k)||k.startsWith(tk)){subj=TEM[k];break}}}if(!subj){tv.innerHTML='<div class="empty"><h2>📂 Sin temas</h2><p>No hay secciones para esta asignatura</p></div>';return}let h=`<div class="tv-hdr">📂 ${subj.name} <span>${Object.keys(subj.units).length} unidades</span></div>`;Object.entries(subj.units).sort().forEach(([ud,d])=>{const tq=d.sections.reduce((a,s)=>a+s.q_count,0);h+=`<div class="tvu" id="t-${ud}"><div class="tvu-h" onclick="this.parentElement.classList.toggle('op')"><h3>${ud}: ${esc(d.title)}</h3><div><span class="bdg">${tq}q · ${d.sections.length} temas</span> <span class="arr">▶</span></div></div><div class="tvu-b">`;d.sections.forEach((s,i)=>{h+=`<div class="tvs" onclick="pracSec('${tk}','${ud}',${i})"><span class="tvs-t">${esc(s.title)}</span>${secProgress(s.questions)}${s.q_count?`<span class="tvs-q">${s.q_count}q →</span>`:''}</div>`});h+='</div></div>'});tv.innerHTML=h}
function pracSec(subj,ud,si){let d=TEM[subj];if(!d){for(const k of Object.keys(TEM)){if(subj.startsWith(k)||k.startsWith(subj)){d=TEM[k];break}}}if(!d)return;const u=d.units[ud];if(!u)return;const s=u.sections[si];if(!s||!s.questions||!s.questions.length)return;tOn=false;document.getElementById("tem-btn").textContent="📂 Por Temas";document.getElementById("tem-btn").className="bg";document.getElementById("qs").style.display="block";document.getElementById("tv").classList.remove("on");cq=shuf(s.questions.map(q=>({p:q.t,o:q.o,r:q.r})));render();window.scrollTo({top:0,behavior:"smooth"})}

function showInfo(){const info=EI[cur];const b=BANKS.find(x=>x.k===cur);document.getElementById("mt").textContent="📋 "+b.n;const mb=document.getElementById("mb");if(!info){mb.innerHTML='<div class="ni">No hay info</div>';document.getElementById("modal").classList.add("show");return}let h="";const st=info.stats||{},tot=info.total||0;if(Object.keys(st).length){h+='<div class="tc"><h3>📊 Distribución</h3><div style="font-size:.8rem;color:var(--tx2);margin-bottom:.4rem">Total: '+tot+'</div>';Object.entries(st).sort().forEach(([k,v])=>{const p=tot?Math.round(v*100/tot):0;h+='<div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.2rem"><span style="font-weight:700;width:18px">'+k.toUpperCase()+'</span><div style="flex:1;height:18px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+p+'%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:4px"></div></div><span style="font-size:.78rem;color:var(--tx2);width:50px">'+v+' ('+p+'%)</span></div>'});h+='</div>'}const ts=info.teachers||[];if(ts.length){h+=ts.map(t=>'<div class="tc"><h3>👨‍🏫 '+t.docente+'</h3><div class="row"><strong>🕒 </strong>'+t.horario+'</div><div class="row"><strong>📝 </strong>'+t.calificacion+'</div><div class="dates"><span class="date-tag date-ord">📅 Ord: '+t.ordinaria+'</span><span class="date-tag date-ext">📅 Ext: '+t.extraordinaria+'</span></div></div>').join("")}if(!h)h='<div class="ni">No hay info</div>';mb.innerHTML=h;document.getElementById("modal").classList.add("show")}
function hideModal(){document.getElementById("modal").classList.remove("show")}

document.addEventListener("keydown",e=>{if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT"||e.target.tagName==="TEXTAREA")return;const k=e.key.toLowerCase();if(k>="a"&&k<="e"){const idx="abcde".indexOf(k);const n=document.querySelector(".qc:not(.gc):not(.rc)");if(n){const qi=parseInt(n.id.replace("q",""));pick(qi,idx)}}else if(k==="n"){const n=document.querySelector(".qc:not(.gc):not(.rc)");if(n)n.scrollIntoView({behavior:"smooth",block:"center"})}else if(k==="m")go();else if(k==="t")togTem();else if(k==="i")showInfo();else if(k>="1"&&k<="9"){const idx=parseInt(k)-1;if(BANKS[idx])sel(BANKS[idx].k)}else if(k==="escape")hideModal()});
document.getElementById("kb").style.display="block";
